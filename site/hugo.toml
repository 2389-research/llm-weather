baseURL = "/"
languageCode = "en-us"
title = "LLM Weather Report"

[params]
  description = "Tracking reasoning capability drift across LLM models"

# Custom output formats
[mediaTypes."text/markdown"]
  suffixes = ["md"]

[outputFormats.markdown]
  mediaType = "text/markdown"
  baseName = "report"
  isPlainText = true

[outputFormats.llmstxt]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[outputFormats.rawjson]
  mediaType = "application/json"
  baseName = "data"
  isPlainText = true

[outputs]
  page = ["HTML"]
  home = ["HTML", "llmstxt"]
  section = ["HTML"]

