<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} — LLM Weather Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F2F6FA;
      --panel: #E1E9F0;
      --panel-alt: #EBF0F5;
      --broadcast-blue: #0B3D91;
      --broadcast-blue-light: #1A5BC4;
      --steady-green: #0D7A4A;
      --alert-amber: #CC7A00;
      --signal-red: #CC3333;
      --text: #1A2233;
      --text-muted: #5A6B80;
      --border: #C8D5E0;
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Instrument Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    /* ---- HEADER ---- */
    .broadcast-header {
      background: var(--broadcast-blue);
      color: var(--white);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .broadcast-title {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .broadcast-title a {
      color: var(--white);
      text-decoration: none;
    }

    .broadcast-subtitle {
      font-size: 0.78rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-left: auto;
    }

    /* ---- MAIN CONTENT ---- */
    .content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 3rem;
    }

    /* ---- HEADINGS ---- */
    h1 {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--broadcast-blue);
      margin-bottom: 0.75rem;
    }

    h2 {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.4rem 0.6rem;
      background: var(--broadcast-blue);
      color: var(--white);
      margin: 1.25rem 0 0.5rem;
    }

    h3 {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--broadcast-blue);
      margin: 1rem 0 0.3rem;
    }

    /* ---- TABLES ---- */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0.5rem 0 1rem;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.84rem;
      font-variant-numeric: tabular-nums;
    }

    thead th {
      background: var(--broadcast-blue);
      color: var(--white);
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.5rem 0.6rem;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap;
      position: sticky;
      top: 0;
    }

    td {
      padding: 0.45rem 0.6rem;
      border: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }

    tbody tr:nth-child(odd) { background: var(--white); }
    tbody tr:nth-child(even) { background: var(--panel-alt); }

    td:first-child {
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--broadcast-blue);
      position: sticky;
      left: 0;
      background: inherit;
      z-index: 1;
    }

    /* ---- LINKS ---- */
    a { color: var(--broadcast-blue-light); text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }

    /* ---- DRIFT ALERTS ---- */
    .drift-alerts {
      background: var(--white);
      border-left: 4px solid var(--signal-red);
      padding: 0.6rem 0.75rem;
      margin: 0.5rem 0 1rem;
    }

    .drift-alerts ul { list-style: none; }

    .drift-alerts li {
      padding: 0.3rem 0;
      font-size: 0.84rem;
      border-bottom: 1px solid var(--panel);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .drift-alerts li:last-child { border-bottom: none; }

    .drift-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
    }

    .drift-tag.regression { background: var(--signal-red); color: var(--white); }
    .drift-tag.improvement { background: var(--steady-green); color: var(--white); }
    .drift-tag.score-drop { background: var(--alert-amber); color: var(--white); }
    .drift-tag.score-rise { background: var(--steady-green); color: var(--white); }

    /* ---- RUN LIST ---- */
    .run-list { list-style: none; }

    .run-list li {
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.84rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .run-list li:nth-child(odd) { background: var(--white); }
    .run-list li:nth-child(even) { background: var(--panel-alt); }

    .run-list .run-date {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-weight: 600;
      color: var(--broadcast-blue);
    }

    .run-list .run-meta {
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-left: auto;
    }

    /* ---- DETAIL ---- */
    .prompt-text {
      font-style: italic;
      color: var(--text-muted);
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--panel);
      margin-bottom: 0.5rem;
    }

    blockquote {
      background: var(--panel-alt);
      border-left: 3px solid var(--border);
      padding: 0.6rem 0.75rem;
      margin: 0.4rem 0;
      font-size: 0.82rem;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 640px) {
      .broadcast-header { padding: 0.75rem 1rem; }
      .broadcast-subtitle { display: none; }
      .content { padding: 1rem; }
      h1 { font-size: 1.2rem; }
      h2 { font-size: 0.78rem; }
      table { font-size: 0.78rem; }
      td, th { padding: 0.35rem 0.45rem; }
      .drift-alerts { padding: 0.5rem; }
      .run-list .run-meta { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <header class="broadcast-header">
    <div class="broadcast-title"><a href="/">LLM Weather Report</a></div>
    <div class="broadcast-subtitle">Capability Drift Tracking</div>
  </header>

  <main class="content">
    {{ block "main" . }}{{ end }}
  </main>
</body>
</html>
