<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} — LLM Weather Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F2F6FA;
      --panel: #E1E9F0;
      --panel-alt: #EBF0F5;
      --broadcast-blue: #0B3D91;
      --broadcast-blue-light: #1A5BC4;
      --steady-green: #0D7A4A;
      --alert-amber: #CC7A00;
      --signal-red: #CC3333;
      --text: #1A2233;
      --text-muted: #5A6B80;
      --border: #C8D5E0;
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Instrument Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
    }

    /* ---- HEADER / BROADCAST BAR ---- */
    .broadcast-header {
      background: var(--broadcast-blue);
      color: var(--white);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }

    .broadcast-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 300%;
      height: 100%;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.02) 40px,
        rgba(255,255,255,0.02) 80px
      );
    }

    .radar-icon {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }

    .radar-icon::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18px;
      height: 18px;
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .radar-icon::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 50%;
      width: 2px;
      height: 50%;
      background: rgba(255,255,255,0.8);
      transform-origin: bottom center;
      animation: radar-sweep 4s linear infinite;
    }

    @keyframes radar-sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .broadcast-title {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .broadcast-title a {
      color: var(--white);
      text-decoration: none;
    }

    .broadcast-subtitle {
      font-size: 0.8rem;
      opacity: 0.7;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-left: auto;
    }

    /* ---- MAIN CONTENT ---- */
    .content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }

    /* ---- SECTION HEADERS ---- */
    h1 {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--broadcast-blue);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    h2 {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.5rem 0.75rem;
      background: var(--broadcast-blue);
      color: var(--white);
      margin: 1.5rem 0 0.75rem;
      border: none;
    }

    h3 {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--broadcast-blue);
      margin: 1.25rem 0 0.4rem;
    }

    /* ---- TABLES (SCORECARD) ---- */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.5rem 0 1rem;
      font-size: 0.88rem;
      font-variant-numeric: tabular-nums;
    }

    thead th {
      background: var(--broadcast-blue);
      color: var(--white);
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.6rem 0.75rem;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap;
    }

    td {
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      text-align: left;
    }

    tbody tr:nth-child(odd) { background: var(--white); }
    tbody tr:nth-child(even) { background: var(--panel-alt); }

    tbody tr:hover { background: var(--panel); }

    td:first-child {
      font-weight: 600;
      font-size: 0.82rem;
      color: var(--broadcast-blue);
      white-space: nowrap;
    }

    /* ---- LINKS ---- */
    a {
      color: var(--broadcast-blue-light);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    /* ---- DRIFT ALERTS ---- */
    .drift-alerts {
      background: var(--white);
      border-left: 4px solid var(--signal-red);
      padding: 0.75rem 1rem;
      margin: 0.75rem 0 1rem;
    }

    .drift-alerts ul {
      list-style: none;
      padding: 0;
    }

    .drift-alerts li {
      padding: 0.35rem 0;
      font-size: 0.88rem;
      border-bottom: 1px solid var(--panel);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .drift-alerts li:last-child { border-bottom: none; }

    .drift-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.45rem;
      border-radius: 2px;
      animation: blip-pulse 2s ease-in-out infinite;
    }

    @keyframes blip-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .drift-tag.regression {
      background: var(--signal-red);
      color: var(--white);
    }

    .drift-tag.improvement {
      background: var(--steady-green);
      color: var(--white);
    }

    .drift-tag.score-drop {
      background: var(--alert-amber);
      color: var(--white);
    }

    .drift-tag.score-rise {
      background: var(--steady-green);
      color: var(--white);
    }

    /* ---- CORRECT / INCORRECT MARKS ---- */
    .mark-correct { color: var(--steady-green); font-weight: 600; }
    .mark-incorrect { color: var(--signal-red); font-weight: 600; }
    .mark-na { color: var(--text-muted); }

    /* ---- RUN LIST ---- */
    .run-list {
      list-style: none;
      padding: 0;
    }

    .run-list li {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .run-list li:nth-child(odd) { background: var(--white); }
    .run-list li:nth-child(even) { background: var(--panel-alt); }

    .run-list li:hover { background: var(--panel); }

    .run-list .run-date {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-weight: 600;
      color: var(--broadcast-blue);
    }

    .run-list .run-meta {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-left: auto;
    }

    /* ---- DETAIL PAGE ---- */
    .prompt-section {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 1rem;
      margin: 0.75rem 0;
    }

    .prompt-text {
      font-style: italic;
      color: var(--text-muted);
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--panel);
      margin-bottom: 0.75rem;
    }

    .judge-verdict {
      font-size: 0.82rem;
      color: var(--text-muted);
      padding: 0.2rem 0;
    }

    blockquote {
      background: var(--panel-alt);
      border-left: 3px solid var(--border);
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
      font-size: 0.85rem;
      color: var(--text);
    }

    /* ---- TICKER BAR ---- */
    .ticker-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--broadcast-blue);
      color: var(--white);
      font-size: 0.78rem;
      font-weight: 500;
      overflow: hidden;
      height: 32px;
      display: flex;
      align-items: center;
      z-index: 100;
    }

    .ticker-label {
      background: var(--signal-red);
      padding: 0 0.75rem;
      height: 100%;
      display: flex;
      align-items: center;
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ticker-scroll {
      overflow: hidden;
      white-space: nowrap;
      flex: 1;
    }

    .ticker-content {
      display: inline-block;
      padding-left: 100%;
      animation: ticker-slide 30s linear infinite;
    }

    .ticker-content span {
      padding: 0 2rem;
    }

    @keyframes ticker-slide {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 768px) {
      .broadcast-header { padding: 1rem; }
      .content { padding: 1rem; }
      .broadcast-subtitle { display: none; }
      table { font-size: 0.78rem; }
      td, th { padding: 0.4rem 0.5rem; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <header class="broadcast-header">
    <div class="radar-icon"></div>
    <div class="broadcast-title"><a href="/">LLM Weather Report</a></div>
    <div class="broadcast-subtitle">Capability Drift Tracking</div>
  </header>

  <main class="content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ block "ticker" . }}{{ end }}
</body>
</html>
