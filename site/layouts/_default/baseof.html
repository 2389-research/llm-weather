<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} — LLM Weather Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#FAFAF7',
            surface: '#FFFFFF',
            'surface-alt': '#F3F1ED',
            border: '#E2DFD8',
            accent: '#2d5a4a',
            'accent-light': '#3a7561',
            rust: '#bf4a24',
            amber: '#B8860B',
            'status-green': '#2d5a4a',
            'status-red': '#A63D2F',
            text: '#1a1a1a',
            'text-secondary': '#6B6560',
            'text-tertiary': '#9B958E',
          },
          fontFamily: {
            display: ["'Bricolage Grotesque'", 'system-ui', 'sans-serif'],
            body: ["'Source Serif 4'", 'Georgia', 'serif'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    /* ---- TABLES ---- */
    .table-wrap {
      @apply overflow-x-auto my-2 mb-5;
      -webkit-overflow-scrolling: touch;
    }

    table {
      @apply w-full border-collapse font-display text-sm tabular-nums;
      font-size: 0.8rem;
    }

    thead th {
      @apply font-bold text-text-secondary py-2 px-2.5 text-left whitespace-nowrap uppercase tracking-wider border-b-2 border-text;
      font-size: 0.68rem;
    }

    td {
      @apply py-2 px-2.5 text-left whitespace-nowrap border-b border-border;
    }

    tbody tr:last-child td { @apply border-b border-text; }

    td:first-child {
      @apply font-semibold text-text sticky left-0 bg-bg z-10;
      font-size: 0.78rem;
    }

    /* ---- MARKS ---- */
    .mark-correct { @apply text-status-green font-semibold text-center; }
    .mark-incorrect { @apply text-status-red font-semibold text-center; }
    .mark-na { @apply text-text-tertiary text-center; }
    .prev-score { @apply block text-text-tertiary italic font-normal; font-size: 0.62rem; }

    /* ---- DRIFT ---- */
    .drift-alerts {
      @apply bg-surface border border-border border-l-[3px] border-l-rust py-3 px-4 my-2 mb-5;
    }
    .drift-alerts ul { @apply list-none p-0; }
    .drift-alerts li {
      @apply py-1 font-display text-sm flex items-center gap-2 flex-wrap;
      font-size: 0.82rem;
    }
    .drift-alerts li + li { @apply border-t border-border pt-1.5; }

    .drift-tag {
      @apply font-display inline-block font-bold uppercase tracking-wide py-0.5 px-1.5 rounded-sm;
      font-size: 0.62rem;
    }
    .drift-tag.regression { @apply bg-status-red text-white; }
    .drift-tag.improvement { @apply bg-status-green text-white; }
    .drift-tag.score-drop { @apply bg-amber text-white; }
    .drift-tag.score-rise { @apply bg-status-green text-white; }

    /* ---- RUN LIST ---- */
    .run-list { @apply list-none p-0; }
    .run-list li {
      @apply py-2 border-b border-border text-sm flex items-baseline gap-3 flex-wrap;
    }
    .run-list .run-date { @apply font-display font-semibold; font-size: 0.84rem; }
    .run-list .run-headline { @apply text-text-secondary flex-1; font-size: 0.78rem; }
    .run-list .run-meta { @apply text-text-tertiary; font-size: 0.78rem; }

    /* ---- MODEL STATUS ---- */
    .model-status ul { @apply list-none p-0; }
    .model-status li {
      @apply py-1 font-display text-sm flex items-center gap-2;
      font-size: 0.84rem;
    }
    .model-status li + li { @apply border-t border-border pt-1.5; }
    .status-indicator {
      @apply inline-flex items-center justify-center w-5 h-5 text-sm font-bold rounded-sm;
    }
    .status-indicator.up { @apply text-status-green; }
    .status-indicator.down { @apply text-status-red; }
    .status-indicator.stable { @apply text-text-tertiary; }
    .status-label {
      @apply text-text-secondary uppercase tracking-wide;
      font-size: 0.72rem;
    }

    /* ---- DATA LINKS ---- */
    .data-links { @apply list-none p-0 font-display text-sm; font-size: 0.82rem; }
    .data-links li { @apply py-1 text-text-secondary; }
    .data-links a { @apply font-semibold; }

    /* ---- HEADINGS ---- */
    h1 { @apply font-display text-2xl font-bold text-text mb-2 tracking-tight; }
    h2 {
      @apply font-display font-bold text-text-secondary uppercase tracking-widest border-b border-border pb-1 mt-8 mb-3;
      font-size: 0.72rem;
    }
    h3 { @apply font-display text-sm font-semibold text-text mt-5 mb-1; }

    /* ---- PROSE OVERRIDES ---- */
    .prose h2 {
      @apply font-display font-bold text-text-secondary uppercase tracking-widest border-b border-border pb-1;
      font-size: 0.72rem;
    }
    .prose h3 { @apply font-display; }
    .prose table { @apply font-display text-sm; font-size: 0.8rem; }
    .prose a { @apply text-accent no-underline hover:underline; }

    @media (max-width: 640px) {
      table { font-size: 0.75rem; }
      td, th { @apply py-1 px-2; }
    }
  </style>
</head>
<body class="bg-bg text-text font-body leading-relaxed">
  <header class="border-b-2 border-text px-8 py-5 flex items-baseline gap-4 max-sm:flex-col max-sm:gap-1 max-sm:px-4">
    <div class="font-display text-xl font-extrabold tracking-tight">
      <a href="/" class="text-text no-underline hover:no-underline">LLM Weather Report</a>
    </div>
    <div class="text-sm italic text-text-tertiary ml-auto max-sm:ml-0">
      Tracking raw LLM reasoning drift — pure endpoint, no agents —
      <a href="/about/" class="text-text-tertiary hover:underline">About</a> ·
      <a href="/skill.md" class="text-text-tertiary hover:underline">Agent Skill</a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-8 pt-8 pb-16 max-sm:px-4 max-sm:pt-5 max-sm:pb-12">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="border-t border-border px-8 py-5 font-display text-xs text-text-tertiary text-center tracking-wide">
    A <a href="https://2389.ai" class="text-text-secondary hover:underline">2389 Research</a> project ·
    <a href="https://github.com/2389-research/llm-weather" class="text-text-secondary hover:underline">GitHub</a>
  </footer>
</body>
</html>
