{{ define "main" }}
<h1>Run: {{ .Title }}</h1>

{{ with .Params.drift }}
<h2>Drift Alerts</h2>
<div class="drift-alerts">
  <ul>
  {{ range . }}
    <li>
      <span class="drift-tag {{ if eq .type "REGRESSION" }}regression{{ else if eq .type "IMPROVEMENT" }}improvement{{ else if eq .type "SCORE_DROP" }}score-drop{{ else }}score-rise{{ end }}">
        {{ .type }}
      </span>
      <strong>{{ .model }}</strong> on {{ .prompt }}
    </li>
  {{ end }}
  </ul>
</div>
{{ end }}

<div class="table-wrap">
{{ .Content }}
</div>
{{ end }}
