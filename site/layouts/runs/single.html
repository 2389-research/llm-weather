{{ define "main" }}
<h1>Run: {{ .Title }}</h1>

{{ with .Params.drift }}
<h2>Drift Alerts</h2>
<ul>
{{ range . }}
  <li class="{{ if eq .type "REGRESSION" }}drift-down{{ else if eq .type "IMPROVEMENT" }}drift-up{{ else if eq .type "SCORE_DROP" }}drift-down{{ else }}drift-up{{ end }}">
    <strong>{{ .type }}</strong>: {{ .model }} on {{ .prompt }}
  </li>
{{ end }}
</ul>
{{ end }}

{{ .Content }}
{{ end }}
